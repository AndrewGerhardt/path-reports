<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>PATH Reporting</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
</head>

<body>
  <div class="app">
    <header>
      <div>
        <h1>Merit Badge Offerings Reports</h1>
        <p id="generatedAt">Loading report data...</p>
      </div>

      <div class="headerButtons">
        <button id="backToSummaryBtn" onclick="backToSummary()" style="display:none;">Back to Summary</button>
        <button onclick="resetDefaultSort()">Reset Sort</button>
        <button onclick="downloadCsv()">Export Current View CSV</button>
      </div>
    </header>

    <section class="filters">
      <label>
        View
        <select id="viewSelect" onchange="renderCurrentView()">
          <option value="summer">Whole Summer</option>
          <option value="weekly">By Week</option>
          <option value="normalized">Weekly Average</option>
          <option value="completion">Completion</option>
        </select>
      </label>

      <label>
        Year
        <select id="yearFilter" onchange="renderCurrentView()"></select>
      </label>

      <label id="sessionFilterLabel">
        Session
        <select id="sessionFilter" onchange="renderCurrentView()"></select>
      </label>

      <label>
        Area
        <select id="areaFilter" onchange="renderCurrentView()"></select>
      </label>

      <label>
        Class Time
        <select id="timeFilter" onchange="renderCurrentView()"></select>
      </label>

      <label>
        Search
        <input id="searchBox" type="text" placeholder="Badge name..." oninput="renderCurrentView()">
      </label>

      <div class="viewModeSwitch">
        <div class="filterLabel">View</div>

        <div class="switchRow">
          <span class="switchLabel active" id="offeringLabel">Offering</span>

          <label class="switch">
            <input id="combineOfferingsCheck" type="checkbox" onchange="toggleDisplayMode()">
            <span class="slider"></span>
          </label>

          <span class="switchLabel" id="badgeLabel">Merit Badge</span>
        </div>
      </div>

    </section>

    <div class="resetFilterRow">
      <button class="secondaryButton" onclick="resetFilters()">
        Reset Filters
      </button>
    </div>

    <section id="summaryCards" class="cards"></section>

    <!--
    <div class="resetMetricsRow">
      <button class="secondaryButton" onclick="resetMetrics()">
        Restore Default Cards
      </button>
    </div>
    -->

    <div class="metricNote">
      Note: Some comparative metrics exclude designated offerings where appropriate.
    </div>

    <main>
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </main>
  </div>

  <script>
    const isLocal =
      location.hostname === "localhost" ||
      location.hostname === "127.0.0.1";

    document.write(
      `<script src="js/${isLocal ? "env.local" : "env"}.js"><\/script>`
    );
  </script>
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/sorting.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/table.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
